name: CI - Testes Automáticos Blog AGI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout do repositório
        uses: actions/checkout@v3

      # 2. Java
      - name: Configurar Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      # 3. Cache Maven
      - name: Cache do Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 4. Instalar Chrome (mais confiável)
      - name: Instalar Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # 5. Criar pasta screenshots
      - name: Criar pasta screenshots
        run: mkdir -p target/screenshots

      # 6. Rodar testes + gerar relatório
      - name: Rodar testes e relatório
        run: mvn clean verify -Dheadless=true

      # 7. Debug (MUITO IMPORTANTE)
      - name: Debug - listar target
        if: always()
        run: |
          echo "=== TARGET ==="
          ls -R target || true

      # 8. Upload screenshots
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: target/screenshots/

      # 9. Upload relatório
      - name: Upload relatório Cucumber
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: target/cucumber-report/

      # 10. Publicar no GitHub Pages
      - name: Publicar relatório HTML
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GH_PAGES_TOKEN }}
          publish_dir: target/cucumber-report/
          force_orphan: true