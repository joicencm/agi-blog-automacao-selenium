name: CI - Testes Automáticos Blog AGI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Checkout do código
      - name: Checkout do repositório
        uses: actions/checkout@v3

      # Configurar Java 17
      - name: Configurar Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      # Cache do Maven para acelerar builds
      - name: Cache do Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # Instalar Chromium (navegador headless)
      - name: Instalar Chromium
        run: sudo apt-get install -y chromium-browser chromium-chromedriver

      # Rodar testes Maven
      - name: Build e rodar testes
        run: mvn clean test

      # Upload de screenshots caso falhe
      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: screenshots
          path: target/screenshots/