name: CI - Testes Automáticos Blog AGI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do código
      - name: Checkout do repositório
        uses: actions/checkout@v3

      # 2. Configurar Java 17
      - name: Configurar Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      # 3. Cache do Maven
      - name: Cache do Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 4. Instalar Google Chrome
      - name: Instalar Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # 5. Criar pasta para screenshots
      - name: Criar pasta screenshots
        run: mkdir -p target/screenshots

      # 6. Rodar testes Maven em modo headless
      - name: Build e rodar testes
        run: mvn clean verify -Dheadless=true -Dmaven.test.failure.ignore=true

      # 7. Upload de screenshots
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: target/screenshots/

      # 8. Upload do relatório Cucumber
      - name: Upload relatório Cucumber
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: target/cucumber-report/

      # 9. Publicar relatório HTML no GitHub Pages
      - name: Publicar relatório HTML
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/cucumber-report/